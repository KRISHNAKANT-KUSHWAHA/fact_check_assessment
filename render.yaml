services:
  - type: web
    name: ai-fact-check-agent-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_APP_NAME
        value: AI Fact-Check Agent
      - key: TAVILY_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false

